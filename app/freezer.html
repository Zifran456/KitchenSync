<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitchenSync - Freezer</title>

  <!-- Bootstrap 5 CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" 
    rel="stylesheet"
  >

  <!-- Our Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="page-wrapper">

    <!-- ========== HEADER ========== -->
    <div class="inner-header">
      <a href="dashboard.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Back
      </a>
      <span class="inner-title">Freezer</span>
      <a href="dashboard.html" class="home-link">
        <i class="bi bi-house-fill"></i>
      </a>
    </div>

    <!-- ========== SEARCH BAR + ADD BUTTON ========== -->
    <div class="search-bar" style="justify-content: flex-end;">
      <div class="search-input-wrapper" style="width: 260px;">
        <input
          type="text"
          placeholder="Search items..."
          class="page-search-input"
          data-target="#freezerItems"
          style="
            width: 100%;
            padding: 0.7rem 2.5rem 0.7rem 1rem;
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: var(--white);
          "
        >
        <span class="search-icon-inside">
          <i class="bi bi-search"></i>
        </span>
      </div>
      <a href="add-item.html" class="add-item-btn">
        <i class="bi bi-plus-lg"></i>
      </a>
    </div>

    <!-- ========== ITEMS LIST (empty for now) ========== -->
    <div id="freezerItems">
      <div class="empty-state">
        <i class="bi bi-archive" style="font-size:3rem; margin-bottom:0.5rem;"></i>
        <p>No items in your freezer yet.</p>
        <a href="add-item.html" style="color: var(--blue-link);">Add your first item</a>
      </div>
    </div>

  </div>
  <!-- End Page Wrapper -->

  <!-- Bootstrap 5 JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Our Custom JS -->
  <script src="js/app.js"></script>

</body>
</html>
