<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitchenSync - Recipes</title>

  <!-- Bootstrap 5 CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" 
    rel="stylesheet"
  >

  <!-- Our Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="page-wrapper">

    <!-- ========== HEADER ========== -->
    <div class="inner-header">
      <a href="dashboard.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Back
      </a>
      <span></span>
      <a href="dashboard.html" class="home-link">
        <i class="bi bi-house-fill"></i>
      </a>
    </div>

    <!-- ========== SEARCH BAR ========== -->
    <div class="search-bar" style="justify-content: flex-end;">
      <div class="search-input-wrapper" style="width: 260px;">
        <input
          type="text"
          placeholder="Search recipes"
          class="page-search-input"
          data-target="#recipeList"
          style="
            width: 100%;
            padding: 0.7rem 2.5rem 0.7rem 1rem;
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: var(--white);
          "
        >
        <span class="search-icon-inside">
          <i class="bi bi-search"></i>
        </span>
      </div>
    </div>

    <!-- ========== RECIPE LIST ========== -->
    <div class="recipe-list" id="recipeList">
      <div class="recipe-grid">

        <!-- Recipe Card: Jollof Rice -->
        <div class="recipe-card searchable-item">
          <div class="recipe-card-image">
            <i class="bi bi-image" style="font-size:2rem; color:#CCC;"></i>
          </div>
          <div class="recipe-card-info">
            <h5>Jollof Rice</h5>
            <p>2 recipes</p>
            <a href="#" class="btn-learn-more">Learn more</a>
          </div>
        </div>

        <!-- Recipe Card: Rice with Zucchini -->
        <div class="recipe-card searchable-item">
          <div class="recipe-card-image">
            <i class="bi bi-image" style="font-size:2rem; color:#CCC;"></i>
          </div>
          <div class="recipe-card-info">
            <h5>Rice with Zucchini, Soft Boiled</h5>
            <p>2 recipes</p>
            <a href="#" class="btn-learn-more">Learn more</a>
          </div>
        </div>

        <!-- Recipe Card: Lasagna -->
        <div class="recipe-card searchable-item">
          <div class="recipe-card-image">
            <i class="bi bi-image" style="font-size:2rem; color:#CCC;"></i>
          </div>
          <div class="recipe-card-info">
            <h5>Lasagna</h5>
            <p>2 recipes</p>
            <a href="#" class="btn-learn-more">Learn more</a>
          </div>
        </div>

        <!-- Recipe Card: Pasta -->
        <div class="recipe-card searchable-item">
          <div class="recipe-card-image">
            <i class="bi bi-image" style="font-size:2rem; color:#CCC;"></i>
          </div>
          <div class="recipe-card-info">
            <h5>Pasta</h5>
            <p>1 recipe</p>
            <a href="#" class="btn-learn-more">Learn more</a>
          </div>
        </div>

        <!-- Recipe Card: Mashed Potatoes -->
        <div class="recipe-card searchable-item">
          <div class="recipe-card-image">
            <i class="bi bi-image" style="font-size:2rem; color:#CCC;"></i>
          </div>
          <div class="recipe-card-info">
            <h5>Mashed Potatoes</h5>
            <p>2 recipes</p>
            <a href="#" class="btn-learn-more">Learn more</a>
          </div>
        </div>

        <!-- Recipe Card: Steak -->
        <div class="recipe-card searchable-item">
          <div class="recipe-card-image">
            <i class="bi bi-image" style="font-size:2rem; color:#CCC;"></i>
          </div>
          <div class="recipe-card-info">
            <h5>Steak</h5>
            <p>2 recipes</p>
            <a href="#" class="btn-learn-more">Learn more</a>
          </div>
        </div>

      </div>
      <!-- End recipe-grid -->

      <!-- Load More Button -->
      <button class="btn-load-more">Load more</button>

    </div>
    <!-- End Recipe List -->

  </div>
  <!-- End Page Wrapper -->

  <!-- Bootstrap 5 JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Our Custom JS -->
  <script src="js/app.js"></script>

</body>
</html>
