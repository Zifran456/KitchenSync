<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitchenSync - Create Account</title>

  <!-- Bootstrap 5 CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" 
    rel="stylesheet"
  >

  <!-- Our Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="page-wrapper">

    <div class="login-page">

      <!-- Header Text -->
      <div class="login-header" style="margin-top: 2rem;">
        <h2>Create Your Account</h2>
      </div>

      <!-- Registration Form -->
      <form id="registerForm" class="login-form">

        <!-- Username -->
        <div class="mb-3">
          <input 
            type="text" 
            class="form-control" 
            id="regUsername" 
            placeholder="Username"
            required
          >
        </div>

        <!-- Email -->
        <div class="mb-3">
          <input 
            type="email" 
            class="form-control" 
            id="regEmail" 
            placeholder="Email address"
            required
          >
        </div>

        <!-- Password -->
        <div class="mb-3">
          <input 
            type="password" 
            class="form-control" 
            id="regPassword" 
            placeholder="Password"
            required
          >
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <input 
            type="password" 
            class="form-control" 
            id="regConfirmPassword" 
            placeholder="Confirm Password"
            required
          >
        </div>

        <!-- Create Account Button -->
        <button type="submit" class="btn-sign-in">
          Create Account
        </button>

      </form>

      <!-- Back to Login -->
      <div class="create-account-section" style="margin-top: 5rem;">
        <p>Already have an account?</p>
        <a href="login.html" class="btn-create-account d-block">
          Sign in
        </a>
      </div>

    </div>

  </div>
  <!-- End Page Wrapper -->

  <!-- Bootstrap 5 JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Our Custom JS -->
  <script src="js/app.js"></script>

  <!-- Simple registration handler -->
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
      event.preventDefault();
      var password = document.getElementById('regPassword').value;
      var confirm = document.getElementById('regConfirmPassword').value;

      if (password !== confirm) {
        alert('Passwords do not match!');
        return;
      }

      // For now, just redirect to login
      alert('Account created! Please sign in.');
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
